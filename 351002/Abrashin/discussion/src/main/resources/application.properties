server.port=24130

spring.cassandra.local-datacenter=${SPRING_CASSANDRA_LOCAL_DATACENTER:${discussion.cassandra.datacenter:datacenter1}}
spring.cassandra.contact-points=${SPRING_CASSANDRA_CONTACT_POINTS:${discussion.cassandra.host:127.0.0.1}}
spring.cassandra.port=${SPRING_CASSANDRA_PORT:${discussion.cassandra.port:9042}}
spring.cassandra.keyspace-name=${SPRING_CASSANDRA_KEYSPACE_NAME:${discussion.cassandra.keyspace:distcomp}}
spring.cassandra.schema-action=NONE
spring.cassandra.connection.connect-timeout=10s
spring.cassandra.connection.init-query-timeout=15s
spring.cassandra.request.timeout=10s

spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.url=${SPRING_LIQUIBASE_URL:${discussion.liquibase.url:jdbc:cassandra://127.0.0.1:9042/distcomp}}

spring.mvc.servlet.load-on-startup=1
