spring.datasource.url=jdbc:h2:mem:dc_test;DB_CLOSE_DELAY=-1;MODE=PostgreSQL;DATABASE_TO_LOWER=TRUE;DEFAULT_NULL_ORDERING=HIGH
spring.datasource.username=sa
spring.datasource.password=
spring.datasource.driver-class-name=org.h2.Driver
spring.jpa.hibernate.ddl-auto=create-drop
spring.liquibase.enabled=false
spring.cache.type=redis
spring.cache.redis.time-to-live=3600000
spring.jpa.show-sql=false

kafka.topic.in=InTopic
kafka.topic.out=OutTopic

spring.kafka.bootstrap-servers=${spring.embedded.kafka.brokers}
spring.kafka.consumer.group-id=distcomp-publisher-out-test
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.acks=all
