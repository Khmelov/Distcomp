server.port=24110

# ????????? ??????????? ? PostgreSQL (Docker container: distcomp-db)
spring.datasource.url=jdbc:postgresql://localhost:5432/postgres
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

# ????????? JPA / Hibernate
spring.jpa.hibernate.ddl-auto=none
spring.jpa.show-sql=true

# ????????? Liquibase
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml

# ????????? Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=publisher-reply-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=by.bsuir.distcomp.dto.*

spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer

# ?????? ?? ???????
app.kafka.in-topic=InTopic
app.kafka.out-topic=OutTopic

# ????????????? ??? ?????????? ?????? RestClient (???? ???????????? REST ?????????)
discussion.base-url=http://localhost:24130
discussion.transport=rest