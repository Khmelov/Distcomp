name: redis_training

services:
  postgres:
    image: postgres:15-alpine
    container_name: publisher_postgres
    restart: always
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    networks:
      - app_network

  redis:
    image: redis:7-alpine
    container_name: publisher_redis
    restart: always
    ports:
      - "6379:6379"
    networks:
      - app_network

  cassandra:
    image: cassandra:5.0
    container_name: discussion_cassandra
    restart: no
    environment:
      CASSANDRA_CLUSTER_NAME: "distcomp"
      MAX_HEAP_SIZE: "512M"
      HEAP_NEWSIZE: "256M"
    ports:
      - "9042:9042"
    networks:
      - app_network
    volumes:
      - cassandra_data:/var/lib/cassandra

  kafka:
    image: apache/kafka:3.7.0
    container_name: publisher_kafka
    restart: no
    ports:
      - "9092:9092"
    environment:
      KAFKA_NODE_ID: 1
      KAFKA_PROCESS_ROLES: broker,controller
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:29092,CONTROLLER://0.0.0.0:9093,EXTERNAL://0.0.0.0:9092
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,EXTERNAL://localhost:9092
      KAFKA_CONTROLLER_LISTENER_NAMES: CONTROLLER
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: CONTROLLER:PLAINTEXT,PLAINTEXT:PLAINTEXT,EXTERNAL:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_CONTROLLER_QUORUM_VOTERS: 1@localhost:9093
      
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1
      KAFKA_GROUP_INITIAL_REBALANCE_DELAY_MS: 0
    networks:
      - app_network

networks:
  app_network:
    driver: bridge

volumes:
  cassandra_data:
