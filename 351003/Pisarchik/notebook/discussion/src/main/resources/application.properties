spring.application.name=discussion
server.port=24130
spring.cassandra.contact-points=127.0.0.1
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=distcomp
spring.cassandra.schema-action=none
spring.liquibase.change-log=classpath:db/changelog-cassandra/db.changelog-master.xml
# Connect to system keyspace first: distcomp does not exist until the first Liquibase changeset runs.
spring.liquibase.url=jdbc:cassandra://127.0.0.1:9042/system?localdatacenter=datacenter1&compliancemode=Liquibase
