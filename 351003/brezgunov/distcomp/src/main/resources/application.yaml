spring:
  application:
    name: 'distcomp'
  mvc:
    apiversion:
      use:
        path-segment: 1
      supported: 1.0, 2.0
      default: 1.0
  datasource:
    url: jdbc:postgresql://localhost:5432/distcomp
    username: postgres
    password: postgres
    driver-class-name: org.postgresql.Driver
  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        dialect: org.hibernate.dialect.PostgreSQLDialect

server:
  port: 24110
