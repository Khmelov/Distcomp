server.port=24130
spring.application.name=discussion

# Cassandra
spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=distcomp
spring.cassandra.schema-action=none

# Kafka
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=discussion-group
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.consumer.key-deserializer=org.apache.kafka.common.serialization.StringDeserializer
spring.kafka.consumer.value-deserializer=org.springframework.kafka.support.serializer.JsonDeserializer
spring.kafka.consumer.properties.spring.json.trusted.packages=com.example.demo.*
spring.kafka.producer.key-serializer=org.apache.kafka.common.serialization.StringSerializer
spring.kafka.producer.value-serializer=org.springframework.kafka.support.serializer.JsonSerializer


# ?? ????????? ?????, ???? ?????? ?? ????????? ?????
spring.kafka.admin.fail-fast=false
spring.kafka.admin.properties.request.timeout.ms=15000
spring.kafka.admin.properties.default.api.timeout.ms=15000

# ????????? ???????? ??? consumer/producer ??? ?????? ???????????
spring.kafka.consumer.properties.session.timeout.ms=30000
spring.kafka.consumer.properties.heartbeat.interval.ms=10000    

# === Liquibase ===
spring.liquibase.enabled=true
spring.liquibase.change-log=classpath:db/changelog/db.changelog-master.xml
spring.liquibase.contexts=dev,test,prod
spring.liquibase.default-schema=distcomp

# === Logging ===
logging.level.org.liquibase=INFO
logging.level.com.example.demo.labrest=DEBUG