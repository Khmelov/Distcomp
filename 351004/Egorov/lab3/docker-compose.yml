version: '3.8'

services:
  postgres:
    image: postgres:17.8-alpine3.22
    container_name: ds_postgres
    environment:
      POSTGRES_USER: ${POSTGRES_USER}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD}
      POSTGRES_DB: ${POSTGRES_DB}
    ports:
      - "${POSTGRES_PORT}:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    restart: unless-stopped
    networks:
      - dc-network
    env_file:
      - .env

  mongodb:
    image: mongo:7.0-jammy
    container_name: ds_mongodb
    environment:
      MONGO_INITDB_ROOT_USERNAME: ${MONGO_USER}
      MONGO_INITDB_ROOT_PASSWORD: ${MONGO_PASSWORD}
      MONGO_INITDB_DATABASE: ${MONGO_DB}
    ports:
      - "${MONGO_PORT}:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped
    networks:
      - dc-network
    env_file:
      - .env

  publisher-service:
    build:
      context: ./publisher
      dockerfile: Dockerfile
    container_name: publisher-service
    environment:
      DATABASE_URL: postgresql://${POSTGRES_USER}:${POSTGRES_PASSWORD}@postgres:5432/${POSTGRES_DB}
      NOTE_SERVICE_URL: http://discussion-service:8000/api/v1.0
    ports:
      - "${PUBLISHER_PORT}:8000"
    depends_on:
      - postgres
    restart: unless-stopped
    networks:
      - dc-network
    volumes:
      - ./publisher:/app
    env_file:
      - .env

  discussion-service:
    build:
      context: ./discussion
      dockerfile: Dockerfile
    container_name: discussion-service
    environment:
      MONGODB_URL: mongodb://${MONGO_USER}:${MONGO_PASSWORD}@mongodb:27017/${MONGO_DB}?authSource=admin
    ports:
      - "${DISCUSSION_PORT}:8000"
    depends_on:
      - mongodb
    restart: unless-stopped
    networks:
      - dc-network
    volumes:
      - ./discussion:/app
    env_file:
      - .env

volumes:
  postgres_data:
  mongodb_data:

networks:
  dc-network:
    driver: bridge