spring.application.name=lab1
server.port=24110
debug=false

# connect to database "distcomp"
spring.datasource.url=jdbc:postgresql://localhost:5432/distcomp
spring.datasource.username=postgres
spring.datasource.password=postgres
spring.datasource.driver-class-name=org.postgresql.Driver

spring.jpa.hibernate.ddl-auto=validate
spring.jpa.open-in-view=false
spring.jpa.properties.hibernate.default_schema=public

spring.liquibase.change-log=classpath:/db/changelog/db.changelog-master.xml
spring.liquibase.default-schema=public
spring.liquibase.liquibase-schema=public
spring.liquibase.enabled=true

# make Liquibase activity visible in logs
logging.level.liquibase=INFO
logging.level.org.liquibase=INFO
logging.level.org.springframework.boot.autoconfigure.liquibase=INFO

# make JSON strictly typed: number -> String should fail (tests expect 4xx)
spring.jackson.mapper.allow-coercion-of-scalars=false

# Redis (Task350) — cache for publisher
spring.cache.type=redis
spring.data.redis.host=localhost
spring.data.redis.port=6379

# discussion (NoSQL comments) module base URL
discussion.base-url=http://localhost:24130

# JWT (Task361)
app.jwt.secret=0123456789abcdef0123456789abcdef0123456789abcdef0123456789abcdef
app.jwt.expiration-ms=86400000
spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.out-group-id=publisher-out
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.properties.linger.ms=0
spring.kafka.consumer.properties.fetch.min.wait.ms=0
app.kafka.in-topic=InTopic
app.kafka.out-topic=OutTopic
