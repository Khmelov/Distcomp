spring.application.name=discussion
server.port=24130

spring.cassandra.contact-points=localhost
spring.cassandra.port=9042
spring.cassandra.local-datacenter=datacenter1
spring.cassandra.keyspace-name=distcomp

# create/update schema via CQL init (see docker-compose cassandra-init)
spring.cassandra.schema-action=none

spring.kafka.bootstrap-servers=localhost:9092
spring.kafka.consumer.group-id=discussion-in
spring.kafka.consumer.auto-offset-reset=earliest
spring.kafka.producer.properties.linger.ms=0
app.kafka.in-topic=InTopic
app.kafka.out-topic=OutTopic

