version: '3.8'

services:
  db:
    image: postgres:15-alpine
    container_name: distcomp_db
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
      POSTGRES_DB: distcomp
    ports:
      - "5432:5432"
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d distcomp"]
      interval: 3s
      timeout: 3s
      retries: 5
    restart: unless-stopped
    volumes:
      - postgres_data:/var/lib/postgresql/data

  liquibase:
    image: liquibase/liquibase:4.24
    container_name: distcomp_liquibase
    depends_on:
      db:
        condition: service_healthy
    volumes:
      - ./db/changelog:/liquibase/changelog
    command: 
      - --url=jdbc:postgresql://db:5432/distcomp
      - --username=postgres
      - --password=postgres
      - --changeLogFile=db.changelog-master.xml
      - update

  app:
    build:
      context: .
      dockerfile: Dockerfile
    container_name: distcomp_app
    ports:
      - "24110:24110"
    env_file:
      - .env
    environment:
      - DB_HOST=db
    restart: unless-stopped
    depends_on:
      liquibase:
        condition: service_completed_successfully

volumes:
  postgres_data: